  <link rel="stylesheet" href="../blog/blog.css"/>
  <style>
    .contact-wrap {
      max-width: 560px;
      padding: 56px 0 80px;
      margin: 0 auto;
    }
    .contact-form {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .contact-form input[type="text"],
    .contact-form input[type="email"],
    .contact-form textarea {
      display: block;
      width: 100%;
      box-sizing: border-box;
      background: #000;
      border: 1px solid #1b1b1b;
      color: #fff;
      font-family: 'Source Sans Pro', arial, sans-serif;
      font-size: 15px;
      padding: 12px 16px;
      transition: border-color 0.2s;
    }
    .contact-form input:focus,
    .contact-form textarea:focus {
      outline: none;
      border-color: rgb(150,150,150);
    }
    .contact-form textarea { resize: vertical; }
    .contact-form .gdpr-row {
      display: flex;
      align-items: flex-start;
      gap: 10px;
    }
    .contact-form .gdpr-row input[type="checkbox"] {
      width: auto;
      flex-shrink: 0;
      margin-top: 3px;
      background: #000;
      border: 1px solid #1b1b1b;
    }
    .contact-form .gdpr-row label {
      font-size: 13px;
      color: rgb(150,150,150);
      line-height: 1.5;
    }
    .contact-form button[type="submit"] {
      align-self: flex-start;
      background: #fff;
      color: #000;
      border: none;
      font-family: 'Montserrat', sans-serif;
      font-size: 12px;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 14px 32px;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .contact-form button[type="submit"]:hover { opacity: 0.8; }
    .contact-form button[type="submit"]:focus-visible {
      outline: 2px solid rgb(150,150,150);
      outline-offset: 3px;
    }
    @media (max-width: 640px) {
      .contact-wrap { padding: 40px 0 60px; }
    }
  </style>

<body>

<header class="page-header">
  <h1>Get in touch</h1>
  <p>Tell us about your organisation and what you are trying to achieve. We respond within one business day.</p>
</header>

<main class="container">
  <div class="contact-wrap">
    <form
      class="contact-form"
      action="https://formspree.io/f/YOUR_FORMSPREE_ID"
      method="POST"
    >
      <input type="hidden" name="_subject" value="New enquiry — Reinvently"/>
      <input type="text" name="name" placeholder="Name" required/>
      <input type="email" name="email" placeholder="Email" required/>
      <textarea name="message" placeholder="Tell us what you are working on" rows="6" required></textarea>
      <div class="gdpr-row">
        <input type="checkbox" name="gdpr_consent" id="gdpr" required/>
        <label for="gdpr">I agree to my data being stored and used to respond to my enquiry.</label>
      </div>
      <button type="submit">Send message</button>
    </form>
  </div>
</main>
